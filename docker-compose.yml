services:
  postgres:
    image: postgres:16
    container_name: ai-governance-sentinel-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_governance_sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: ai-governance-sentinel-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_governance_sentinel
    depends_on:
      - postgres

volumes:
  postgres_data:
